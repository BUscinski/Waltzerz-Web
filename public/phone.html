<!DOCTYPE html>
<html>
<head>
  <title>Phone Controller</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      font-size: 24px;
      text-align: center;
      margin: 20px;
    }
    #data-display {
      margin-top: 20px;
    }
    .data-item {
      margin: 10px 0;
      font-size: 32px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <input type="text" id="name" placeholder="Enter your name" />
  <button id="join">Join</button>

  <div id="data-display">
    <p class="data-item">X: <span id="x">--</span></p>
    <p class="data-item">Y: <span id="y">--</span></p>
    <p class="data-item">Z: <span id="z">--</span></p>
    <p class="data-item">Pitch: <span id="pitch">--</span></p>
    <p class="data-item">Roll: <span id="roll">--</span></p>
    <p class="data-item">Yaw: <span id="yaw">--</span></p>
    <p id="jerk-status" style="color: red; font-size: 28px; margin-top: 20px;"></p>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    socket.on("connect", () => {
      console.log("Connected to server");
    });

    socket.on("disconnect", () => {
      console.log("Disconnected from server");
    });

    socket.on("update_thresholds", (data) => {
      ACCEL_JERK_THRESHOLD = data.accel;
      ROT_JERK_THRESHOLD = data.rot;
      console.log("Thresholds updated:", ACCEL_JERK_THRESHOLD, ROT_JERK_THRESHOLD);
    });

    socket.on("reset", () => {
      document.getElementById('jerk-status').textContent = '';
      clearTimeout(jerkTimeout);
      loadCount = 0;
      loadMagnitudes = [];
      isGameActive = false;
    });

    socket.on("game_start", (data) => {
      console.log("Game started!");
      isGameActive = true;
      loadCount = 0;
      loadMagnitudes = [];
      document.getElementById('jerk-status').textContent = 'GO!';
      setTimeout(() => {
        document.getElementById('jerk-status').textContent = '';
      }, 2000);
    });

    socket.on("countdown", (data) => {
      console.log("Countdown:", data.count);
      document.getElementById('jerk-status').textContent = data.count.toString();
    });

    socket.on("game_ended", (data) => {
      console.log("Game ended!", data);
      isGameActive = false;
      document.getElementById('jerk-status').textContent = `Final Loads: ${loadCount}`;
    });

    const FRAME_HISTORY = 10; // Number of past frames to keep for smoothing

    // Arrays to store historical data
    let accelXHistory = [];
    let accelYHistory = [];
    let accelZHistory = [];
    let pitchHistory = [];
    let rollHistory = [];
    let yawHistory = [];

    // Function to calculate average of an array
    function average(arr) {
      if (arr.length === 0) return 0;
      return arr.reduce((a, b) => a + b, 0) / arr.length;
    }

    // Function to maintain array length
    function maintainHistory(arr, value) {
      arr.push(value);
      if (arr.length > FRAME_HISTORY) {
        arr.shift();
      }
    }

    // Variables for load detection
    let prevTime = null;
    let prevSmoothed = null;
    let jerkTimeout;
    let loadCount = 0;
    let loadMagnitudes = [];
    let isGameActive = false;
    let lastLoadTime = 0; // Debounce loads to prevent doubles
    const LOAD_DEBOUNCE = 300; // 300ms between loads

    // Load detection thresholds (adjust based on phone calibration)
    let ACCEL_JERK_THRESHOLD = 50; // m/s³ per second
    let ROT_JERK_THRESHOLD = 100; // degrees/s² per second

    document.getElementById("join").onclick = async () => {
      console.log("Join button clicked");
      const name = document.getElementById("name").value.trim();
      if (!name) {
        alert("Please enter your name");
        return;
      }
      console.log("Emitting join for", name);
      socket.emit("join", { name });

      if (typeof DeviceMotionEvent.requestPermission === "function") {
        console.log("Requesting permission");
        await DeviceMotionEvent.requestPermission();
      }

      console.log("Adding devicemotion listener");
      window.addEventListener("devicemotion", (event) => {
        console.log("Device motion event:", event.acceleration);
        const rawData = {
          x: event.acceleration.x || 0,
          y: event.acceleration.y || 0,
          z: event.acceleration.z || 0,
          pitch: event.rotationRate.alpha || 0,
          roll: event.rotationRate.beta || 0,
          yaw: event.rotationRate.gamma || 0,
        };

        // Add to history
        maintainHistory(accelXHistory, rawData.x);
        maintainHistory(accelYHistory, rawData.y);
        maintainHistory(accelZHistory, rawData.z);
        maintainHistory(pitchHistory, rawData.pitch);
        maintainHistory(rollHistory, rawData.roll);
        maintainHistory(yawHistory, rawData.yaw);

        // Compute smoothed data
        const smoothedData = {
          x: average(accelXHistory),
          y: average(accelYHistory),
          z: average(accelZHistory),
          pitch: average(pitchHistory),
          roll: average(rollHistory),
          yaw: average(yawHistory),
        };

        // Jerk detection
        const currentTime = event.timeStamp;
        if (prevTime !== null && prevSmoothed !== null) {
          const deltaTime = (currentTime - prevTime) / 1000; // seconds
          if (deltaTime > 0) {
            // Accelerometer jerk (magnitude of jerk vector)
            const jerkAccelX = (smoothedData.x - prevSmoothed.x) / deltaTime;
            const jerkAccelY = (smoothedData.y - prevSmoothed.y) / deltaTime;
            const jerkAccelZ = (smoothedData.z - prevSmoothed.z) / deltaTime;
            const jerkAccelMagnitude = Math.sqrt(jerkAccelX**2 + jerkAccelY**2 + jerkAccelZ**2);

            // Rotation jerk (magnitude of angular jerk vector)
            const jerkRotPitch = (smoothedData.pitch - prevSmoothed.pitch) / deltaTime;
            const jerkRotRoll = (smoothedData.roll - prevSmoothed.roll) / deltaTime;
            const jerkRotYaw = (smoothedData.yaw - prevSmoothed.yaw) / deltaTime;
            const jerkRotMagnitude = Math.sqrt(jerkRotPitch**2 + jerkRotRoll**2 + jerkRotYaw**2);

            // Detect accelerometer load
            const now = Date.now();
            if (jerkAccelMagnitude > ACCEL_JERK_THRESHOLD && isGameActive && (now - lastLoadTime) > LOAD_DEBOUNCE) {
              console.log("Accelerometer load detected:", jerkAccelMagnitude.toFixed(2));
              document.getElementById('jerk-status').textContent = `Load: ${loadCount + 1}`;
              loadCount++;
              loadMagnitudes.push(jerkAccelMagnitude);
              lastLoadTime = now;
              clearTimeout(jerkTimeout);
              jerkTimeout = setTimeout(() => document.getElementById('jerk-status').textContent = '', 1000);
              socket.emit("load", { type: "accel", value: jerkAccelMagnitude });
            }

            // Detect rotation load
            if (jerkRotMagnitude > ROT_JERK_THRESHOLD && isGameActive && (now - lastLoadTime) > LOAD_DEBOUNCE) {
              console.log("Rotation load detected:", jerkRotMagnitude.toFixed(2));
              document.getElementById('jerk-status').textContent = `Load: ${loadCount + 1}`;
              loadCount++;
              loadMagnitudes.push(jerkRotMagnitude);
              lastLoadTime = now;
              clearTimeout(jerkTimeout);
              jerkTimeout = setTimeout(() => document.getElementById('jerk-status').textContent = '', 1000);
              socket.emit("load", { type: "rot", value: jerkRotMagnitude });
            }
          }
        }
        prevTime = currentTime;
        prevSmoothed = { ...smoothedData };

        // Update the display with smoothed values
        document.getElementById('x').textContent = smoothedData.x.toFixed(2);
        document.getElementById('y').textContent = smoothedData.y.toFixed(2);
        document.getElementById('z').textContent = smoothedData.z.toFixed(2);
        document.getElementById('pitch').textContent = smoothedData.pitch.toFixed(2);
        document.getElementById('roll').textContent = smoothedData.roll.toFixed(2);
        document.getElementById('yaw').textContent = smoothedData.yaw.toFixed(2);

        // Emit smoothed data to server
        socket.emit("imu", smoothedData);
      });
    };
  </script>
</body>
</html>
