<!DOCTYPE html>
<html>
<head>
  <title>Shake Weight</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; margin: 0; background: #1a1a2e; color: #eee; }
    .container { max-width: 960px; margin: 0 auto; padding: 20px; }
    h1 { color: #e94560; text-align: center; font-size: 36px; margin-bottom: 20px; }
    h2 { color: #eee; margin: 0 0 12px; border-bottom: 2px solid #e94560; padding-bottom: 8px; }

    .card { background: #16213e; border-radius: 10px; padding: 20px; margin: 14px 0; }

    #qr-display { text-align: center; }
    #qrcode { display: inline-block; background: white; padding: 10px; border-radius: 6px; }

    .controls { text-align: center; }
    input[type="number"] {
      font-size: 16px; padding: 10px 16px; margin: 8px;
      border: 2px solid #0f3460; border-radius: 6px;
      background: #0f3460; color: #eee; outline: none; width: 120px;
    }
    input[type="number"]:focus { border-color: #e94560; }
    button {
      font-size: 16px; padding: 10px 24px; margin: 8px;
      border: none; border-radius: 6px; cursor: pointer;
      background: #e94560; color: white;
    }
    button:hover { background: #c73652; }
    button:disabled { background: #555; cursor: not-allowed; }

    .threshold-control { text-align: center; margin: 16px 0; }
    .threshold-control span { margin-left: 10px; font-size: 18px; font-weight: bold; color: #e94560; }

    #countdown-display { font-size: 72px; font-weight: bold; text-align: center; color: #e94560; margin: 16px 0; }

    .player-item {
      background: #0f3460; padding: 14px 16px; margin: 10px 0;
      border-radius: 8px; border-left: 4px solid #e94560;
    }
    .player-name { font-weight: bold; font-size: 18px; }
    .player-score { font-size: 15px; color: #aaa; margin-top: 6px; }
    .progress-bar-container {
      background: #1a1a2e; height: 18px; border-radius: 10px;
      overflow: hidden; margin-top: 8px;
    }
    .progress-bar {
      background: #e94560; height: 100%; width: 0%;
      transition: width 0.3s; display: flex; align-items: center;
      justify-content: center; color: white; font-size: 11px; font-weight: bold;
    }

    #leaderboard { display: none; text-align: center; }
    .winner-banner {
      background: #e94560; color: white;
      font-size: 32px; font-weight: bold;
      padding: 20px; border-radius: 10px; margin-bottom: 16px;
    }
    .leaderboard-entry {
      background: #0f3460; padding: 14px 16px;
      margin: 8px 0; border-radius: 8px; font-size: 18px;
    }
    .leaderboard-entry.first { background: #5a4000; font-weight: bold; }
    .leaderboard-entry.second { background: #2a2a3e; }
    .leaderboard-entry.third { background: #3a2a1a; }

    #game-status { font-size: 16px; text-align: center; color: #aaa; margin: 10px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Shake Weight</h1>

    <div class="card" id="qr-display">
      <h2>Join Game</h2>
      <p style="color:#aaa">Scan to join on your phone:</p>
      <div id="qrcode"></div>
    </div>

    <div class="card">
      <h2>Game Settings</h2>
      <div class="threshold-control">
        <label for="threshold-input">Score Threshold:</label>
        <input type="number" id="threshold-input" value="300" min="50" max="5000" step="50" />
        <span id="threshold-display">300</span>
      </div>
      <p style="font-size:13px;color:#aaa;margin-top:8px">First player to reach this score wins. Lower = shorter game.</p>
    </div>

    <div class="card controls">
      <button id="start-btn" disabled>Start Game</button>
      <button id="reset-btn" style="background:#555">Reset Game</button>
    </div>

    <div id="countdown-display"></div>

    <div class="card" id="players-section" style="display:none">
      <h2>Player Scores</h2>
      <div id="game-status"></div>
      <div id="player-list"></div>
    </div>

    <div id="leaderboard" class="card">
      <h2>Game Over!</h2>
      <div class="winner-banner" id="winner-banner"></div>
      <div id="leaderboard-list"></div>
      <button id="play-again-btn" style="margin-top:16px">Play Again</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io('/shakeweight');
    let players = {};
    let gameActive = false;
    let jerkThreshold = 300;
    const phoneUrl = `${window.location.protocol}//${window.location.host}/shakeweight-phone.html`;

    new QRCode(document.getElementById('qrcode'), {
      text: phoneUrl, width: 220, height: 220,
      colorDark: '#e94560', colorLight: '#ffffff'
    });

    document.getElementById('threshold-input').addEventListener('input', (e) => {
      jerkThreshold = parseInt(e.target.value);
      document.getElementById('threshold-display').textContent = jerkThreshold;
    });

    document.getElementById('start-btn').onclick = () => {
      if (Object.keys(players).length > 0) {
        socket.emit('start_shakeweight_game', { threshold: jerkThreshold });
        document.getElementById('threshold-input').disabled = true;
      }
    };

    document.getElementById('reset-btn').onclick = () => {
      socket.emit('reset_shakeweight_game');
      location.reload();
    };

    document.getElementById('play-again-btn').onclick = () => {
      socket.emit('reset_shakeweight_game');
      location.reload();
    };

    socket.on('player_joined', ({ playerId, playerName }) => {
      players[playerId] = { name: playerName, jerk: 0 };
      document.getElementById('players-section').style.display = 'block';
      updatePlayersList();
      document.getElementById('start-btn').disabled = false;
    });

    socket.on('player_left', ({ playerId }) => {
      delete players[playerId];
      updatePlayersList();
      if (Object.keys(players).length === 0) document.getElementById('start-btn').disabled = true;
    });

    socket.on('game_started', () => {
      gameActive = true;
      Object.keys(players).forEach(id => { players[id].jerk = 0; });
      updatePlayersList();
      document.getElementById('qr-display').style.display = 'none';
      document.getElementById('start-btn').disabled = true;
      document.getElementById('threshold-input').disabled = true;
    });

    socket.on('countdown', ({ time }) => {
      const el = document.getElementById('countdown-display');
      if (time > 0) {
        el.textContent = time;
      } else {
        el.textContent = 'GO!';
        setTimeout(() => { el.textContent = ''; }, 1000);
      }
    });

    socket.on('jerk_scores_update', ({ scores }) => {
      if (!gameActive) return;
      Object.keys(scores).forEach(id => {
        if (players[id]) players[id].jerk = scores[id];
      });
      updatePlayersList();
    });

    socket.on('game_ended', ({ winner, finalScores }) => {
      gameActive = false;
      document.getElementById('players-section').style.display = 'none';
      document.getElementById('leaderboard').style.display = 'block';
      document.getElementById('winner-banner').textContent = `🏆 ${winner.name} Wins!`;

      const sorted = Object.entries(finalScores).sort((a, b) => b[1] - a[1]);
      document.getElementById('leaderboard-list').innerHTML = sorted.map(([id, score], i) => {
        const name = players[id]?.name ?? 'Unknown';
        const cls = i === 0 ? 'first' : i === 1 ? 'second' : i === 2 ? 'third' : '';
        return `<div class="leaderboard-entry ${cls}">${i + 1}. ${name} — ${Math.floor(score)}</div>`;
      }).join('');
    });

    function updatePlayersList() {
      document.getElementById('game-status').textContent =
        gameActive ? 'Game in progress!' : 'Waiting to start...';
      document.getElementById('player-list').innerHTML = Object.entries(players).map(([id, p]) => {
        const pct = Math.min((p.jerk / jerkThreshold) * 100, 100);
        return `
          <div class="player-item">
            <div class="player-name">${p.name}</div>
            <div class="player-score">${Math.floor(p.jerk)} / ${jerkThreshold}</div>
            <div class="progress-bar-container">
              <div class="progress-bar" style="width:${pct}%">${pct > 12 ? Math.floor(pct) + '%' : ''}</div>
            </div>
          </div>`;
      }).join('');
    }
  </script>
</body>
</html>
