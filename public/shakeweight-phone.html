<!DOCTYPE html>
<html>
<head>
  <title>Shake Weight Phone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif; margin: 0; padding: 0;
      background: #1a1a2e; color: #eee; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
    }
    h1 { color: #e94560; font-size: 32px; margin: 28px 0 20px; }

    .card {
      background: #16213e; border-radius: 12px; padding: 24px;
      width: 100%; max-width: 440px; margin-bottom: 16px;
      text-align: center;
    }

    input[type="text"] {
      width: 100%; padding: 14px; font-size: 18px;
      border: 2px solid #0f3460; border-radius: 8px;
      background: #0f3460; color: #eee; outline: none; margin-bottom: 12px;
    }
    input[type="text"]:focus { border-color: #e94560; }

    button.primary {
      width: 100%; padding: 16px; font-size: 20px; font-weight: bold;
      background: #e94560; color: white; border: none;
      border-radius: 8px; cursor: pointer;
    }
    button.primary:disabled { background: #555; cursor: not-allowed; }

    #join-area { width: 100%; max-width: 440px; padding: 0 24px; }
    #calibrating-area { width: 100%; max-width: 440px; padding: 0 24px; display: none; text-align: center; }
    #game-area { display: none; width: 100%; max-width: 440px; padding: 0 24px; text-align: center; }

    .calib-bar-wrap {
      width: 100%; background: #0f3460; border-radius: 8px;
      height: 16px; margin: 16px 0;
    }
    .calib-bar { height: 16px; border-radius: 8px; background: #e94560; width: 0%; transition: width 0.1s; }

    #countdown-display { font-size: 80px; font-weight: bold; color: #e94560; margin: 20px 0; }
    #shake-screen { font-size: 52px; font-weight: bold; color: #eee; margin: 20px 0; }
    #jerk-score { font-size: 32px; font-weight: bold; color: #e94560; margin: 16px 0; }
    #status { font-size: 18px; color: #aaa; margin-top: 16px; }
  </style>
</head>
<body>
  <h1>Shake Weight</h1>

  <div id="join-area">
    <div class="card">
      <input type="text" id="name" placeholder="Your name" maxlength="20" />
      <button class="primary" id="join">Join Game</button>
    </div>
  </div>

  <div id="calibrating-area">
    <div class="card">
      <p style="font-size:22px;font-weight:bold;margin:0 0 8px">Hold still...</p>
      <p style="color:#aaa;margin:0 0 16px">Calibrating your phone's sensors</p>
      <div class="calib-bar-wrap"><div class="calib-bar" id="calib-bar"></div></div>
      <p id="calib-countdown" style="color:#aaa;font-size:16px;margin:8px 0 0"></p>
    </div>
  </div>

  <div id="game-area">
    <div id="countdown-display"></div>
    <div id="shake-screen">🎯 SHAKE! 🎯</div>
    <div id="jerk-score">Score: <span id="current-jerk">0</span></div>
    <div id="status"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io('/shakeweight');
    let gameActive = false;
    let currentJerkScore = 0;
    let sendInterval = null;

    const CALIB_DURATION_MS = 2500;
    let calibSamples = [];
    let calibMean = 0;
    let calibStddev = 1;
    let calibrated = false;
    let calibrating = false;

    const FRAME_HISTORY = 20;
    let accelXHistory = [], accelYHistory = [], accelZHistory = [];
    let prevSmoothed = null;

    function average(arr) {
      return arr.length === 0 ? 0 : arr.reduce((a, b) => a + b, 0) / arr.length;
    }

    function stddev(arr, mean) {
      if (arr.length < 2) return 1;
      return Math.sqrt(arr.reduce((s, v) => s + Math.pow(v - mean, 2), 0) / arr.length) || 1;
    }

    function maintainHistory(arr, value) {
      arr.push(value);
      if (arr.length > FRAME_HISTORY) arr.shift();
    }

    function computeJerkMag(smoothed) {
      if (!prevSmoothed) return 0;
      return Math.sqrt(
        Math.pow(smoothed.x - prevSmoothed.x, 2) +
        Math.pow(smoothed.y - prevSmoothed.y, 2) +
        Math.pow(smoothed.z - prevSmoothed.z, 2)
      );
    }

    function startCalibration(onDone) {
      calibrating = true;
      calibSamples = [];
      const startTime = Date.now();
      document.getElementById('join-area').style.display = 'none';
      document.getElementById('calibrating-area').style.display = 'block';

      const barEl = document.getElementById('calib-bar');
      const countEl = document.getElementById('calib-countdown');

      const progressInterval = setInterval(() => {
        const elapsed = Date.now() - startTime;
        barEl.style.width = Math.min((elapsed / CALIB_DURATION_MS) * 100, 100) + '%';
        const remaining = Math.ceil((CALIB_DURATION_MS - elapsed) / 1000);
        countEl.textContent = remaining > 0 ? remaining + 's' : '';

        if (elapsed >= CALIB_DURATION_MS) {
          clearInterval(progressInterval);
          calibrating = false;
          calibMean = average(calibSamples);
          calibStddev = stddev(calibSamples, calibMean);
          console.log(`Calibrated — mean: ${calibMean.toFixed(4)}, stddev: ${calibStddev.toFixed(4)}`);
          document.getElementById('calibrating-area').style.display = 'none';
          calibrated = true;
          onDone();
        }
      }, 100);
    }

    function onMotion(event) {
      const raw = {
        x: event.acceleration.x || 0,
        y: event.acceleration.y || 0,
        z: event.acceleration.z || 0,
      };
      maintainHistory(accelXHistory, raw.x);
      maintainHistory(accelYHistory, raw.y);
      maintainHistory(accelZHistory, raw.z);

      const smoothed = {
        x: average(accelXHistory),
        y: average(accelYHistory),
        z: average(accelZHistory),
      };
      const jerkMag = computeJerkMag(smoothed);
      prevSmoothed = smoothed;

      if (calibrating) { calibSamples.push(jerkMag); return; }

      if (gameActive && calibrated) {
        const z = (jerkMag - calibMean) / calibStddev;
        if (z > 0) currentJerkScore += z;
        document.getElementById('current-jerk').textContent = Math.floor(currentJerkScore);
      }
    }

    document.getElementById('join').onclick = async () => {
      const name = document.getElementById('name').value.trim();
      if (!name) return;
      document.getElementById('join').disabled = true;
      if (typeof DeviceMotionEvent.requestPermission === 'function') {
        await DeviceMotionEvent.requestPermission();
      }
      window.addEventListener('devicemotion', onMotion);
      startCalibration(() => {
        socket.emit('join', { name });
        document.getElementById('game-area').style.display = 'block';
        document.getElementById('status').textContent = 'Waiting for the game to start...';
      });
    };

    socket.on('game_started', () => {
      gameActive = true;
      currentJerkScore = 0;
      document.getElementById('status').textContent = 'Shake your phone!';
      if (sendInterval) clearInterval(sendInterval);
      sendInterval = setInterval(() => {
        if (gameActive) socket.emit('jerk_update', { score: currentJerkScore });
      }, 500);
    });

    socket.on('countdown', ({ time }) => {
      document.getElementById('countdown-display').textContent = time > 0 ? time : 'GO!';
    });

    socket.on('game_ended', () => {
      gameActive = false;
      document.getElementById('shake-screen').style.display = 'none';
      document.getElementById('status').textContent = 'Game ended! Check the host for results.';
      if (sendInterval) clearInterval(sendInterval);
    });

    socket.on('reset_game', () => {
      gameActive = false;
      currentJerkScore = 0;
      calibrated = false;
      calibSamples = [];
      prevSmoothed = null;
      accelXHistory = []; accelYHistory = []; accelZHistory = [];
      document.getElementById('countdown-display').textContent = '';
      document.getElementById('shake-screen').style.display = 'block';
      document.getElementById('game-area').style.display = 'none';
      document.getElementById('join-area').style.display = 'block';
      document.getElementById('join').disabled = false;
      document.getElementById('status').textContent = '';
      if (sendInterval) clearInterval(sendInterval);
      window.removeEventListener('devicemotion', onMotion);
    });
  </script>
</body>
</html>
