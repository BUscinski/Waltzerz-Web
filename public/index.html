<!DOCTYPE html>
<html>
<head>
  <title>Phone Game Platform</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 50px;
    }
    .game-button {
      display: inline-block;
      padding: 20px 40px;
      margin: 20px;
      font-size: 24px;
      background-color: #4CAF50;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }
    .game-button:hover {
      background-color: #45a049;
    }
    .game-button.shake {
      background-color: #ff6600;
    }
    .game-button.shake:hover {
      background-color: #e55a00;
    }
  </style>
</head>
<body>
  <h1>Welcome to Phone Game Platform</h1>
  <p>Choose a game to play:</p>
  <button class="game-button" onclick="window.location.href='waltzers.html'">Waltzers</button>
  <button class="game-button" onclick="window.location.href='busters.html'">Busters</button>
  <button class="game-button shake" onclick="window.location.href='shakeweight.html'">Shake Weight</button>
</body>
</html>
