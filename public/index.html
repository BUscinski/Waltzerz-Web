<!DOCTYPE html>
<html>
<head>
  <title>Game Host</title>
</head>
<body>
  <img src="/images/Manual J.png" alt="Waltzerz" style="max-width: 100%; height: auto; margin-bottom: 20px;">
  
  <h2>Scan to Join</h2>
  <div id="qr"></div>

  <h2>Players:</h2>
  <div id="players"></div>

  <button id="startGame" style="margin-top: 20px; padding: 15px 30px; font-size: 18px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer;">Start Game</button>

  <h2>Game Controls</h2>
  <input type="number" id="accelThresh" placeholder="Accel Threshold" value="50">
  <input type="number" id="rotThresh" placeholder="Rot Threshold" value="100">
  <button id="updateThresh">Update Thresholds for All Phones</button>
  <br><br>
  <button id="endGame">End Game</button>
  <button id="resetGame">Reset Game</button>

  <h2>Countdown: <span id="countdownDisplay">--</span></h2>
  <div id="leaderboard" style="display: none; margin-top: 30px;">
    <h2>🎮 FINAL SCORES 🎮</h2>
    <div id="jerkie" style="margin-bottom: 30px; padding: 20px; background: gold; border: 3px solid red; border-radius: 10px;"></div>
    <div id="scoreList" style="margin-top: 20px;"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script>
    const socket = io();
    const playersDiv = document.getElementById("players");
    const players = {}; // id -> {name, color}

    socket.on("player_joined", (data) => {
      const { id, name, color } = data;
      players[id] = { name, color, loads: 0 };
      updatePlayersDisplay();
    });

    socket.on("player_left", (data) => {
      const { id } = data;
      delete players[id];
      updatePlayersDisplay();
    });

    socket.on("load_broadcast", (data) => {
      if (players[data.id]) {
        players[data.id].loads = data.loads;
        updatePlayersDisplay();
      }
    });

    socket.on("countdown", (data) => {
      document.getElementById("countdownDisplay").textContent = data.count;
    });

    socket.on("game_ended", (data) => {
      console.log("Game ended with scores:", data);
      showLeaderboard(data.scores, data.jerkiest);
    });

    socket.on("reset", () => {
      document.getElementById("leaderboard").style.display = "none";
      document.getElementById("countdownDisplay").textContent = "--";
      for (const id in players) {
        players[id].loads = 0;
      }
      updatePlayersDisplay();
    });

    document.getElementById("updateThresh").onclick = () => {
      const accel = parseFloat(document.getElementById("accelThresh").value);
      const rot = parseFloat(document.getElementById("rotThresh").value);
      socket.emit("update_thresholds", { accel, rot });
    };

    document.getElementById("startGame").onclick = () => {
      socket.emit("start_game");
    };

    document.getElementById("endGame").onclick = () => {
      socket.emit("end_game");
    };

    document.getElementById("resetGame").onclick = () => {
      socket.emit("reset");
    };

    function updatePlayersDisplay() {
      playersDiv.innerHTML = "";
      for (const [id, player] of Object.entries(players)) {
        const p = document.createElement("p");
        p.textContent = `${player.name} - ${player.loads} loads`;
        p.style.color = player.color;
        p.style.fontSize = "24px";
        p.style.fontWeight = "bold";
        playersDiv.appendChild(p);
      }
    }

    function showLeaderboard(scores, jerkiest) {
      document.getElementById("leaderboard").style.display = "block";
      
      // Show jerkiest prominently
      const jerkieDiv = document.getElementById("jerkie");
      if (jerkiest) {
        jerkieDiv.innerHTML = `
          <h3>⚡ JERKIEST PLAYER ⚡</h3>
          <p style="font-size: 32px; color: ${jerkiest.color}; font-weight: bold;">${jerkiest.name}</p>
          <p style="font-size: 24px;">Avg Magnitude: ${jerkiest.avgMagnitude}</p>
        `;
      }
      
      // Show load rankings (ascending, then top descending)
      const scoreList = document.getElementById("scoreList");
      scoreList.innerHTML = "<h3>📊 LOAD RANKINGS 📊</h3>";
      
      scores.forEach((score, index) => {
        const p = document.createElement("p");
        p.textContent = `${index + 1}. ${score.name} - ${score.loads} loads`;
        p.style.color = score.color;
        p.style.fontSize = "20px";
        p.style.fontWeight = "bold";
        p.style.padding = "10px";
        scoreList.appendChild(p);
      });
    }

    const url = window.location.origin + "/phone.html";

    QRCode.toCanvas(url, function (err, canvas) {
      document.getElementById("qr").appendChild(canvas);
    });
  </script>
</body>
</html>
